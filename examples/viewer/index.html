<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Imposia Viewer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22><rect width=%22100%25%22 height=%22100%25%22 fill=%22%23ef6a3b%22/></svg>">
    <link rel="stylesheet" href="/packages/viewer/src/styles.css">
    <script type="importmap">
      {
        "imports": {
          "pdfjs-dist": "/node_modules/pdfjs-dist/build/pdf.mjs"
        }
      }
    </script>
  </head>
  <body>
    <main id="viewer" aria-label="Document viewer"></main>
    <script type="module">
      import { mountViewer } from "/packages/viewer/dist/index.js";

      const params = new URLSearchParams(location.search);
      const source = params.get("pdf") ?? "/output/pdf/imposia-example.pdf";
      const delay = params.get("delay");
      const url = delay === null ? source : `${source}?delay=${encodeURIComponent(delay)}`;
      globalThis.imposiaViewer = mountViewer(document.querySelector("#viewer"), url, {
        workerSrc: "/node_modules/pdfjs-dist/build/pdf.worker.min.mjs",
      });
    </script>
  </body>
</html>
